[window]
opacity = 0.90
dynamic_title = false
dynamic_padding = true

[colors.primary]
background = "#141414"

[font]
size = 11.25

[font.normal]
family = "Cascadia Code NF"
style = "Regular"

[font.bold]
family = "Cascadia Code NF"
style = "Bold"

[font.italic]
family = "Cascadia Code NF"
style = "Italic"

[font.bold_italic]
family = "Cascadia Code NF"
style = "Bold Italic"

[terminal.shell]
program = "wsl.exe"
args = ["-d", "Ubuntu", "--cd", "~"]
