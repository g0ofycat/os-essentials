set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g escape-time 10
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" "rename-window '%%'"

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-. next-window
bind -n M-, previous-window
bind -n M-< swap-window -t -1 \; previous-window
bind -n M-> swap-window -t +1 \; next-window

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind x kill-pane

bind S new-session
bind m choose-session
bind $ command-prompt -I "#S" "rename-session '%%'"

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind P paste-buffer

bind n source-file ~/.tmux.conf \; display "Config reloaded"
bind ? list-keys

set -g status-position top
set -g status-justify left
set -g status-style "bg=#121212 fg=#bcbcbc"
set -g status-left  "#[bg=#1c1c1c,fg=#eeeeee,bold] #S #[default] "
set -g status-right "#[bg=#1c1c1c,fg=#808080] %H:%M  %d %b #[default]"
set -g status-left-length  30
set -g status-right-length 30

set -g window-status-format "\
#{?#{==:#{window_index},1},#[bg=#1c1c1c fg=#767676],\
#{?#{==:#{window_index},2},#[bg=#303030 fg=#808080],\
#{?#{==:#{window_index},3},#[bg=#3a3a3a fg=#878787],\
#{?#{==:#{window_index},4},#[bg=#444444 fg=#8a8a8a],\
#{?#{==:#{window_index},5},#[bg=#4e4e4e fg=#949494],\
#{?#{==:#{window_index},6},#[bg=#585858 fg=#9e9e9e],\
#{?#{==:#{window_index},7},#[bg=#626262 fg=#a8a8a8],\
#{?#{==:#{window_index},8},#[bg=#6c6c6c fg=#b2b2b2],\
#[bg=#767676 fg=#bcbcbc]]}}}}}}}} #I:#W#{?window_flags,#{window_flags}, } "

	set -g window-status-current-format "\
#{?#{==:#{window_index},1},#[bg=#1c1c1c fg=#eeeeee bold],\
#{?#{==:#{window_index},2},#[bg=#303030 fg=#eeeeee bold],\
#{?#{==:#{window_index},3},#[bg=#3a3a3a fg=#eeeeee bold],\
#{?#{==:#{window_index},4},#[bg=#444444 fg=#eeeeee bold],\
#{?#{==:#{window_index},5},#[bg=#4e4e4e fg=#eeeeee bold],\
#{?#{==:#{window_index},6},#[bg=#585858 fg=#eeeeee bold],\
#{?#{==:#{window_index},7},#[bg=#626262 fg=#eeeeee bold],\
#{?#{==:#{window_index},8},#[bg=#6c6c6c fg=#eeeeee bold],\
#[bg=#767676 fg=#eeeeee bold]]}}}}}}}} #I:#W#{?window_flags,#{window_flags}, } "

	set -g window-status-separator ""

	set -g pane-border-style        "fg=#3a3a3a"
	set -g pane-active-border-style "fg=#767676"

	set -g message-style         "bg=#303030 fg=#eeeeee"
	set -g message-command-style "bg=#303030 fg=#bcbcbc"

	set -g @plugin 'tmux-plugins/tmux-resurrect'

	run '~/.tmux/plugins/tpm/tpm'

